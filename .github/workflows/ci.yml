name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# Read-only by default; jobs opt into more where they need it (Phase 1 hardening).
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force JavaScript actions (incl. codecov's transitive github-script) onto Node 24
# (current LTS), ahead of GitHub's forced migration. Remove once all actions ship Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Syntax check
        run: ./tests/run-tests.sh --syntax

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck -x -s bash -S warning backupd.sh lib/*.sh

      - name: Unit tests
        run: ./tests/run-tests.sh --unit

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # Codecov OIDC upload — no CODECOV_TOKEN secret needed
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      # Reuse the same harness as local runs (single source of truth for kcov +
      # deps). kcov is not in the Ubuntu repos, so it is built from a pinned tag
      # inside the image; see tests/docker/Dockerfile.
      - name: Build coverage harness (pinned kcov v43)
        run: docker build -t backupd-ci tests/docker

      - name: Measure coverage (unit + best-effort integration)
        run: docker run --rm -v "$PWD":/src -w /src backupd-ci ./tests/run-tests.sh --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false
